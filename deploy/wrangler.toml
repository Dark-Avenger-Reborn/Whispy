name = "whispy-cdn"
main = "cloudflare-worker.js"
compatibility_date = "2024-01-01"
workers_dev = false

# Your custom domain
routes = [
  { pattern = "cdn.whispy.dev/*", zone_name = "whispy.dev" }
]

# Set ORIGIN_URL in the Cloudflare dashboard under Workers > Settings > Variables
# Or use: wrangler secret put ORIGIN_URL
[vars]
# ORIGIN_URL = "https://your-origin-server.example.com"  # Set via dashboard secret

[limits]
cpu_ms = 50
