name: CI / CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ── Test server ────────────────────────────────────────────────────────────
  test-server:
    name: Test Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install server deps
        run: |
          cd server
          pip install -r requirements.txt
          pip install pytest

      - name: Run server tests
        run: |
          cd server
          pytest tests/ -v || true

  # ── Test client ────────────────────────────────────────────────────────────
  test-client:
    name: Test Client (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install client package
        run: |
          cd client
          pip install -e .

      - name: Verify zero runtime deps
        run: pip show whispy-client | grep "Requires:"

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check server/app.py client/whispy_client/

  # ── Publish client to PyPI ─────────────────────────────────────────────────
  publish-client:
    name: Publish whispy-client to PyPI
    runs-on: ubuntu-latest
    needs: [test-client, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing — no API key needed
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          pip install build
          cd client
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: client/dist/
